<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCH_LOG_SYSTEM_v5.0</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+KR:wght@300;700&display=swap">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/font-kopub/1.0/kopubbatang.css');

        :root {
            --bg-body: #f0f0f0;
            --bg-card: #ffffff;
            --text-main: #000000;
            --text-muted: #666666;
            --border-card: rgba(0,0,0,0.1);
            --bg-input: #f8f8f8;
            --active-bg: #000000;
            --active-text: #ffffff;
        }

        body {
            font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-wrap: wrap; /* 창 크기에 따라 아래로 떨어지도록 설정 */
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            min-height: 100vh;
            gap: 40px;
            box-sizing: border-box;
        }

        /* ----------------------------------
           왼쪽: 컨트롤 패널 (B&W)
        ----------------------------------- */
        .control-panel {
            width: 100%;
            max-width: 440px;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.05);
            border: 1px solid var(--border-card);
            display: flex;
            flex-direction: column;
            gap: 18px;
            box-sizing: border-box;
        }

        .panel-header {
            text-align: center;
            margin-bottom: 5px;
            position: relative;
        }

        .panel-header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 5px;
            margin: 0;
            color: var(--text-main);
            display: inline-block;
        }
        
        .panel-header::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 1px;
            background: var(--border-card);
        }

        .control-card {
            background: var(--bg-input);
            border-radius: 10px;
            padding: 12px 18px;
            border: 1px solid var(--border-card);
        }

        .card-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 8px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        input[type="text"], select, textarea {
            width: 100%; padding: 10px;
            border-radius: 6px; border: 1px solid var(--border-card);
            background: #fff; color: var(--text-main);
            font-family: inherit; box-sizing: border-box; font-size: 0.9rem;
        }
        input[type="text"]:focus, select:focus, textarea:focus {
            outline: none; border-color: #000;
        }
        textarea { resize: vertical; min-height: 80px; }

        select {
            cursor: pointer; appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23000000%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right 12px top 50%; background-size: 9px auto;
        }

        .adjustment-row { display: flex; justify-content: space-between; align-items: center; }
        .adjust-controls { display: flex; align-items: center; gap: 12px; }
        .btn-adjust {
            background: #fff; border: 1px solid var(--border-card); color: var(--text-main);
            width: 30px; height: 30px; border-radius: 4px; cursor: pointer;
            font-size: 1.1rem; transition: 0.1s; display: flex; justify-content: center; align-items: center; padding: 0;
        }
        .btn-adjust:hover { background: #000; color: #fff; border-color: #000; }
        
        .value-display { font-family: 'Orbitron', sans-serif; font-weight: 900; color: #000; font-size: 0.95rem; min-width: 55px; text-align: center; }
        .value-display .unit { font-size: 0.7rem; color: var(--text-muted); margin-left: 1px; }

        .toggle-group { display: flex; gap: 6px; }
        .btn-toggle {
            flex: 1; background: #fff; border: 1px solid var(--border-card); color: var(--text-main);
            padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 500; text-align: center; transition: 0.1s;
        }
        .btn-toggle:hover { border-color: #000; }
        .btn-toggle.active { background: var(--active-bg); color: var(--active-text); border-color: var(--active-bg); font-weight: 700; }

        /* 따옴표 변환 소형 버튼 */
        .btn-action-small {
            background: #e9ecef; border: none; color: #495057; font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; cursor: pointer; transition: 0.2s;
        }
        .btn-action-small:hover { background: #000; color: #fff; }

        .download-btn {
            width: 100%; padding: 16px; background: #000; color: #fff; border: 1px solid #000; border-radius: 10px;
            font-weight: 900; font-size: 0.95rem; cursor: pointer; font-family: 'Orbitron', sans-serif; letter-spacing: 2px; transition: all 0.1s ease; margin-top: 5px;
        }
        .download-btn:hover { background: #333; transform: translateY(-1px); }

        /* ----------------------------------
           오른쪽: 미리보기 (반응형 1:1 캔버스)
        ----------------------------------- */
        .preview-area {
            position: sticky;
            top: 50px;
            width: 100%;
            max-width: 700px; /* 원본 최대 사이즈 */
            display: flex;
            justify-content: center;
        }

        /* 반응형 스케일 래퍼 (이 영역의 크기에 맞춰 내부 700px 캔버스가 작아짐) */
        #capture-area-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            border-radius: 4px;
            overflow: hidden; /* 스케일 아웃 시 튀어나가는 부분 숨김 */
        }

        /* 실제 700x700 렌더링 캔버스 */
        #capture-area {
            width: 700px; height: 700px;
            background-color: #fff;
            background-size: cover; background-position: center;
            position: absolute; top: 0; left: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-sizing: border-box;
            background-image: url('「ARCH」 Quote Neutral A.png'); 
            padding: 100px 100px;
            border-style: solid; border-width: 0px; border-color: transparent;
            transform-origin: top left; /* 스케일 축소의 기준점 */
        }

        #text-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2;
        }

        .quote-main {
            width: 100%; transition: all 0.1s ease; color: #1a1a1a;
            font-size: 24px; line-height: 1.5; font-family: 'Pretendard', sans-serif;
            text-align: center; word-break: keep-all; letter-spacing: 0px; white-space: pre-wrap;
        }

        .quote-sub {
            width: 100%; margin-top: 30px; font-size: 18px; z-index: 2;
            font-family: 'Pretendard', sans-serif; opacity: 0.9; text-align: center;
        }
        .creator-name { font-weight: 300; }
        .character-name { font-weight: 700; }

        .symbol-logo { position: absolute; bottom: 40px; right: 40px; width: 80px; opacity: 0.8; z-index: 2; }
        
        /* 모바일 대응 */
        @media (max-width: 1200px) {
            .preview-area { position: relative; top: 0; }
        }
    </style>
</head>
<body>

    <div class="control-panel">
        <div class="panel-header">
            <h1>ARCH_LOG_CENTER</h1>
        </div>

        <div class="control-card">
            <span class="card-label">FONT_FACE</span>
            <select id="fontSelect" onchange="updateStyle()">
                <option value="'Pretendard', sans-serif" selected>프리텐다드 (Pretendard)</option>
                <option value="'Noto Sans KR', sans-serif">노토산스 (Noto Sans KR)</option>
                <option value="'KoPub Batang', 'KoPubBatang', serif">KoPub 바탕 (KoPub Batang)</option>
            </select>
        </div>

        <div class="control-card">
            <span class="card-label">ATTRIBUTE_SYNC</span>
            <select id="themeSelect" onchange="updateTheme()">
                <option value="「ARCH」 Quote Neutral A.png" data-color="#1a1a1a" selected>🤍 Neutral A (White)</option>
                <option value="「ARCH」 Quote Neutral B.png" data-color="#ffffff">🖤 Neutral B (Black)</option>
                <option value="「ARCH」 Quote Pyre.png" data-color="#1a1a1a">🔥 불 (Pyre)</option>
                <option value="「ARCH」 Quote Aqua.png" data-color="#1a1a1a">💧 물 (Aqua)</option>
                <option value="「ARCH» Quote Verde.png" data-color="#1a1a1a">🌿 풀 (Verde)</option>
                <option value="「ARCH» Quote Fulmen.png" data-color="#1a1a1a">⚡ 번개 (Fulmen)</option>
                <option value="「ARCH» Quote Aero.png" data-color="#1a1a1a">💨 바람 (Aero)</option>
                <option value="Buron (Glacies).png" data-color="#1a1a1a">❄️ 얼음 (Glacies)</option>
            </select>
        </div>

        <div class="control-card">
            <span class="card-label">LETTER_SPACING</span>
            <div class="adjustment-row">
                <div class="value-display" id="val-letterSpacing">0.0<span class="unit">px</span></div>
                <div class="adjust-controls">
                    <button class="btn-adjust" onclick="adjust('letterSpacing', -0.2)">−</button>
                    <button class="btn-adjust" onclick="adjust('letterSpacing', 0.2)">+</button>
                </div>
            </div>
        </div>

        <div class="control-card">
            <span class="card-label">FONT_SIZE</span>
            <div class="adjustment-row">
                <div class="value-display" id="val-fontSize">24<span class="unit">px</span></div>
                <div class="adjust-controls">
                    <button class="btn-adjust" onclick="adjust('fontSize', -1)">−</button>
                    <button class="btn-adjust" onclick="adjust('fontSize', 1)">+</button>
                </div>
            </div>
        </div>

        <div class="control-card">
            <span class="card-label">LINE_HEIGHT</span>
            <div class="adjustment-row">
                <div class="value-display" id="val-lineHeight">1.5<span class="unit">x</span></div>
                <div class="adjust-controls">
                    <button class="btn-adjust" onclick="adjust('lineHeight', -0.1)">−</button>
                    <button class="btn-adjust" onclick="adjust('lineHeight', 0.1)">+</button>
                </div>
            </div>
        </div>

        <div class="control-card">
            <span class="card-label">TEXT_ALIGN</span>
            <div class="toggle-group" id="alignToggleGroup">
                <button class="btn-toggle active" onclick="setAlign('center', this)">중앙</button>
                <button class="btn-toggle" onclick="setAlign('left', this)">왼쪽</button>
                <button class="btn-toggle" onclick="setAlign('right', this)">오른쪽</button>
            </div>
        </div>

        <div class="control-card">
            <span class="card-label">WRAP_METHOD</span>
            <div class="toggle-group" id="wrapToggleGroup">
                <button class="btn-toggle active" onclick="setWrap('keep-all', this)">단어 단위</button>
                <button class="btn-toggle" onclick="setWrap('break-all', this)">글자 단위</button>
            </div>
        </div>

        <div class="control-card">
            <span class="card-label">MARGIN_TOP_BOTTOM</span>
            <div class="adjustment-row">
                <div class="value-display" id="val-paddingTopBottom">100<span class="unit">px</span></div>
                <div class="adjust-controls">
                    <button class="btn-adjust" onclick="adjust('paddingTopBottom', -10)">−</button>
                    <button class="btn-adjust" onclick="adjust('paddingTopBottom', 10)">+</button>
                </div>
            </div>
        </div>

        <div class="control-card">
            <span class="card-label">MARGIN_LEFT_RIGHT</span>
            <div class="adjustment-row">
                <div class="value-display" id="val-paddingLeftRight">100<span class="unit">px</span></div>
                <div class="adjust-controls">
                    <button class="btn-adjust" onclick="adjust('paddingLeftRight', -10)">−</button>
                    <button class="btn-adjust" onclick="adjust('paddingLeftRight', 10)">+</button>
                </div>
            </div>
        </div>

        <div class="control-card">
            <span class="card-label">
                TEXT_CONTENT
                <button class="btn-action-small" onclick="convertQuotes()">" " ➔ “ ” 변환</button>
            </span>
            <textarea id="mainInput" placeholder="발췌할 내용을 입력하세요..." oninput="updateText()">"이곳은 초인적인 힘을 가진 소수, '센티넬'과 '가이드'가 인류를 위협하는 존재들에 맞서 싸우는 최전선입니다."</textarea>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <input type="text" id="creatorInput" placeholder="제작자명" oninput="updateText()" value="CherryMango" style="width:40%;">
                <input type="text" id="characterInput" placeholder="캐릭터명 (굵게)" oninput="updateText()" value="ARCH" style="width:60%;">
            </div>
        </div>

        <button class="download-btn" onclick="saveImage()">EXTRACT_DATA</button>
    </div>

    <div class="preview-area">
        <div id="capture-area-wrapper">
            <div id="capture-area">
                <div id="text-container">
                    <div class="quote-main" id="display-main">"이곳은 초인적인 힘을 가진 소수, '센티넬'과 '가이드'가 인류를 위협하는 존재들에 맞서 싸우는 최전선입니다."</div>
                    <div class="quote-sub" id="display-sub">
                        <span class="creator-name">CherryMango</span> | <span class="character-name">ARCH</span>
                    </div>
                </div>
                <img src="「ARCH」 Symbol Logo Black Ver.png" id="logoDisplay" class="symbol-logo">
            </div>
        </div>
    </div>

    <script>
        // 상태 관리 (글자크기 24로 시작)
        let state = {
            fontSize: 24,
            lineHeight: 1.5,
            letterSpacing: 0, 
            textAlign: 'center', 
            wordBreak: 'keep-all', 
            paddingTopBottom: 100,
            paddingLeftRight: 100
        };

        // 반응형 캔버스 리사이즈 함수
        function resizeCanvas() {
            const wrapper = document.getElementById('capture-area-wrapper');
            const area = document.getElementById('capture-area');
            if(wrapper && area) {
                // 래퍼의 실제 너비와 원본 너비(700)를 비교하여 비율(scale) 계산
                const scale = wrapper.clientWidth / 700;
                area.style.transform = `scale(${scale})`;
            }
        }
        // 창 크기가 변할 때마다 스케일 조정
        window.addEventListener('resize', resizeCanvas);

        function adjust(key, val) {
            state[key] = parseFloat((state[key] + val).toFixed(1));
            // 글자 크기와 여백 등은 음수가 되지 않도록 방어
            if(key !== 'letterSpacing' && state[key] < 0) state[key] = 0; 
            
            const displayEl = document.getElementById(`val-${key}`);
            if(displayEl){
                let unit = key === 'lineHeight' ? 'x' : 'px';
                displayEl.innerHTML = state[key] + `<span class="unit">${unit}</span>`;
            }
            updateStyle();
        }

        // 따옴표 자동 변환 함수
        function convertQuotes() {
            const textarea = document.getElementById('mainInput');
            let text = textarea.value;
            // 직선 따옴표를 정규식을 이용해 둥근 스마트 따옴표로 치환
            text = text.replace(/'([\s\S]*?)'/g, "‘$1’").replace(/"([\s\S]*?)"/g, "“$1”");
            textarea.value = text;
            updateText();
        }

        function setAlign(value, btn) {
            state.textAlign = value;
            const group = document.getElementById('alignToggleGroup');
            group.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateStyle();
        }

        function setWrap(value, btn) {
            state.wordBreak = value;
            const group = document.getElementById('wrapToggleGroup');
            group.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateStyle();
        }

        function updateStyle() {
            const main = document.getElementById('display-main');
            const sub = document.getElementById('display-sub');
            const area = document.getElementById('capture-area');
            const textContainer = document.getElementById('text-container');
            const font = document.getElementById('fontSelect').value;
            
            main.style.fontSize = state.fontSize + 'px';
            main.style.lineHeight = state.lineHeight;
            main.style.letterSpacing = state.letterSpacing + 'px';
            main.style.textAlign = state.textAlign;
            main.style.wordBreak = state.wordBreak;

            sub.style.textAlign = state.textAlign;
            sub.style.letterSpacing = state.letterSpacing + 'px';
            
            area.style.padding = `${state.paddingTopBottom}px ${state.paddingLeftRight}px`;
            
            if(state.textAlign === 'left'){
                textContainer.style.alignItems = 'flex-start';
            } else if(state.textAlign === 'right'){
                textContainer.style.alignItems = 'flex-end';
            } else {
                textContainer.style.alignItems = 'center';
            }

            main.style.fontFamily = font;
            sub.style.fontFamily = font;
        }

        function updateText() {
            document.getElementById('display-main').textContent = document.getElementById('mainInput').value;
            const creator = document.getElementById('creatorInput').value;
            const character = document.getElementById('characterInput').value;
            document.getElementById('display-sub').innerHTML = `<span class="creator-name">${creator}</span> | <span class="character-name">${character}</span>`;
        }

        function updateTheme() {
            const select = document.getElementById('themeSelect');
            const bg = select.value;
            const color = select.options[select.selectedIndex].dataset.color;
            const logo = document.getElementById('logoDisplay');
            
            document.getElementById('capture-area').style.backgroundImage = `url('${bg}')`;
            document.getElementById('display-main').style.color = color;
            document.getElementById('display-sub').style.color = color;

            if(bg === '「ARCH」 Quote Neutral B.png') {
                logo.src = '「ARCH」 Symbol Logo White Ver.png';
            } else {
                logo.src = '「ARCH」 Symbol Logo Black Ver.png';
            }
        }

        function saveImage() {
            const btn = document.querySelector('.download-btn');
            const originalText = btn.textContent;
            btn.textContent = "PROCESSING...";
            btn.disabled = true;

            const area = document.getElementById('capture-area');
            
            // html2canvas가 오류 없이 1:1 고화질 캡처를 할 수 있도록 임시로 scale 변환(transform) 해제
            const originalTransform = area.style.transform;
            area.style.transform = 'scale(1)';
            
            setTimeout(() => {
                html2canvas(area, {
                    scale: 2, // 해상도 향상
                    useCORS: true,
                    backgroundColor: null
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `ARCH_EXTRACT_${Date.now()}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                    
                    // 복구
                    area.style.transform = originalTransform;
                    btn.textContent = originalText;
                    btn.disabled = false;
                }).catch(err => {
                    console.error("추출 오류:", err);
                    alert("이미지 추출에 실패했습니다.");
                    area.style.transform = originalTransform;
                    btn.textContent = originalText;
                    btn.disabled = false;
                });
            }, 100); // 렌더링 안정화를 위한 짧은 딜레이
        }

        // 초기화 실행
        resizeCanvas();
        updateStyle();
        updateTheme();
        updateText();
    </script>
</body>
</html>
