<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCH_LOG_SYSTEM_v8.2</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Noto+Sans+KR:wght@300;700&family=Noto+Serif+KR:wght@300;700&family=Nanum+Myeongjo:wght@400;700&family=Nanum+Gothic:wght@400;700&display=swap">
    <style>
        @import url('https://cdn.jsdelivr.net/font-kopub/1.0/kopubbatang.css');

        :root {
            /* 라이트 모드 (기본) */
            --bg-body: #f4f5f7;
            --bg-card: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #868e96;
            --border-card: #dee2e6;
            --bg-input: #f8f9fa;
            --active-bg: #212529;
            --active-text: #ffffff;
            --accent: #3b82f6; 
        }

        /* 다크 모드 (블랙 테마) 설정 */
        body.dark-mode {
            --bg-body: #121212;
            --bg-card: #1e1e1e;
            --text-main: #f8f9fa;
            --text-muted: #adb5bd;
            --border-card: #333333;
            --bg-input: #2b2b2b;
            --active-bg: #f8f9fa;
            --active-text: #121212;
            --accent: #60a5fa;
        }

        body {
            font-family: 'Noto Sans KR', 'Pretendard', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-wrap: wrap; 
            justify-content: center;
            align-items: flex-start;
            padding: 50px 20px;
            min-height: 100vh;
            gap: 40px;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        /* ----------------------------------
           직접 캡쳐 모드 (UI 숨김)
        ----------------------------------- */
        body.capture-mode .control-panel,
        body.capture-mode .theme-toggle-btn {
            display: none !important;
        }
        
        body.capture-mode {
            align-items: center; /* 세로 중앙 정렬 */
            padding: 0;
        }

        #exitCaptureBtn {
            display: none;
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            padding: 12px 24px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            font-family: 'Pretendard', sans-serif;
            transition: 0.2s;
        }
        #exitCaptureBtn:hover { background: #ff6b81; transform: translateX(-50%) translateY(-2px); }
        
        body.capture-mode #exitCaptureBtn {
            display: block;
        }

        /* 다크모드 토글 버튼 */
        .theme-toggle-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.85rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: all 0.2s ease;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .theme-toggle-btn:hover { border-color: var(--text-main); }

        /* ----------------------------------
           왼쪽: 컨트롤 패널
        ----------------------------------- */
        .control-panel {
            flex: 1 1 400px;
            max-width: 480px;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid var(--border-card);
            display: flex;
            flex-direction: column;
            gap: 18px;
            box-sizing: border-box;
            transition: background-color 0.3s, border-color 0.3s;
        }

        .panel-header { text-align: center; margin-bottom: 5px; }
        .panel-header h1 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; letter-spacing: 4px; margin: 0; color: var(--text-main); }
        .panel-header hr { width: 40px; border: none; border-top: 2px solid var(--text-main); margin: 10px auto 0; }

        .control-card {
            background: var(--bg-card); 
            border-radius: 10px;
            padding: 15px;
            border: 1px solid var(--border-card);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .card-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 폰트 선택 그리드 */
        .font-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .btn-font {
            background: var(--bg-card); border: 1px solid var(--border-card); color: var(--text-muted);
            padding: 12px 5px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; text-align: center; transition: 0.2s;
        }
        .btn-font:hover { border-color: var(--text-muted); color: var(--text-main); }
        .btn-font.active {
            border-color: var(--accent); color: var(--accent); background-color: rgba(59, 130, 246, 0.05); font-weight: 600;
        }

        .f-notoserif { font-family: 'Noto Serif KR', serif; }
        .f-kopub { font-family: 'KoPub Batang', 'KoPubBatang', serif; }
        .f-myeongjo { font-family: 'Nanum Myeongjo', serif; }
        .f-pretendard { font-family: 'Pretendard', sans-serif; }
        .f-notosans { font-family: 'Noto Sans KR', sans-serif; }
        .f-gothic { font-family: 'Nanum Gothic', sans-serif; }
        .f-orbitron { font-family: 'Orbitron', sans-serif; grid-column: span 3; } 

        input[type="text"], select, textarea {
            width: 100%; padding: 12px; border-radius: 6px; border: 1px solid var(--border-card);
            background: var(--bg-input); color: var(--text-main); font-family: inherit; box-sizing: border-box; font-size: 0.95rem;
            transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        }
        input[type="text"]:focus, select:focus, textarea:focus { outline: none; border-color: var(--text-main); }
        textarea { resize: vertical; min-height: 90px; }

        /* 다크모드 드롭다운 아이콘 대체 처리 (기본 형태 유지) */
        select {
            cursor: pointer; appearance: none;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23868e96%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat; background-position: right 15px top 50%; background-size: 10px auto;
        }
        body.dark-mode select { filter: none; background-color: var(--bg-input); color: var(--text-main); }

        .adjustment-row { display: flex; justify-content: space-between; align-items: center; }
        .adjust-controls { display: flex; align-items: center; gap: 12px; }
        .btn-adjust {
            background: var(--bg-card); border: 1px solid var(--border-card); color: var(--text-muted);
            width: 32px; height: 32px; border-radius: 6px; cursor: pointer;
            font-size: 1.1rem; transition: 0.1s; display: flex; justify-content: center; align-items: center; padding: 0;
        }
        .btn-adjust:hover { background: var(--active-bg); color: var(--active-text); border-color: var(--active-bg); }
        
        .value-display { font-weight: 700; color: var(--accent); font-size: 1rem; min-width: 55px; text-align: center; }
        .value-display .unit { font-size: 0.75rem; color: var(--text-muted); margin-left: 2px; }

        .toggle-group { display: flex; gap: 8px; }
        .btn-toggle {
            flex: 1; background: var(--bg-card); border: 1px solid var(--border-card); color: var(--text-muted);
            padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; text-align: center; transition: 0.1s;
        }
        .btn-toggle:hover { border-color: var(--text-main); color: var(--text-main); }
        .btn-toggle.active { color: var(--accent); border-color: var(--accent); font-weight: 700; background-color: rgba(59, 130, 246, 0.05); }

        .btn-action-small {
            background: var(--bg-input); border: 1px solid var(--border-card); color: var(--text-main);
            font-size: 0.75rem; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 4px; font-weight: 600;
        }
        .btn-action-small:hover { background: var(--active-bg); color: var(--active-text); border-color: var(--active-bg); }

        /* 저장/복사/수동캡쳐 버튼 그룹 */
        .action-btn-group { display: flex; gap: 8px; margin-top: 10px; }
        .btn-primary, .btn-secondary {
            padding: 14px 10px; border-radius: 10px; font-weight: 700; font-size: 0.9rem; cursor: pointer;
            font-family: 'Orbitron', 'Noto Sans KR', 'Pretendard', sans-serif; letter-spacing: 0.5px; transition: all 0.2s ease;
        }
        .btn-primary {
            flex: 1.5; background: var(--active-bg); color: var(--active-text); border: none;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        
        .btn-secondary {
            flex: 1; background: var(--bg-input); color: var(--text-main); border: 1px solid var(--border-card);
        }
        .btn-secondary:hover { border-color: var(--text-main); background: var(--bg-card); }

        /* ----------------------------------
           오른쪽: 미리보기 (반응형 1:1 캔버스)
        ----------------------------------- */
        .preview-area {
            flex: 1 1 400px; 
            max-width: 700px;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 40px;
        }

        #capture-area-wrapper {
            width: 100%; aspect-ratio: 1 / 1; position: relative;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; background: #fff;
        }
        body.dark-mode #capture-area-wrapper { box-shadow: 0 15px 40px rgba(0,0,0,0.5); }

        #capture-area {
            width: 700px; height: 700px; background-color: #fff;
            background-size: cover; background-position: center; position: absolute; top: 0; left: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-sizing: border-box; background-image: url('「ARCH」 Quote Neutral A.png'); 
            padding: 100px; transform-origin: top left; 
        }

        #text-container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2; }
        .quote-main { width: 100%; transition: all 0.1s ease; color: #1a1a1a; font-size: 24px; line-height: 1.5; font-family: 'Noto Sans KR', sans-serif; text-align: center; word-break: keep-all; letter-spacing: 0px; white-space: pre-wrap; }
        .quote-sub { width: 100%; margin-top: 30px; font-size: 18px; z-index: 2; font-family: inherit; opacity: 0.9; text-align: center; }
        .creator-name { font-weight: 300; }
        .character-name { font-weight: 700; }
        .symbol-logo { position: absolute; bottom: 40px; right: 40px; width: 80px; opacity: 0.8; z-index: 2; }
        
        @media (max-width: 900px) { .preview-area { position: relative; top: 0; } }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <button id="exitCaptureBtn" onclick="toggleCaptureMode()">돌아가기 (ESC)</button>

    <button class="theme-toggle-btn" onclick="toggleDarkMode()">
        <span id="themeIcon">🌙</span> <span id="themeText">DARK MODE</span>
    </button>

    <div class="control-panel">
        <div class="panel-header">
            <h1>ARCH_LOG_CENTER</h1>
            <hr>
        </div>

        <div class="control-card">
            <div class="card-label">텍스트 스타일 (Font)</div>
            <div class="font-grid" id="fontToggleGroup">
                <button class="btn-font f-notoserif" onclick="setFont('\'Noto Serif KR\', serif', this)">Noto Serif</button>
                <button class="btn-font f-kopub" onclick="setFont('\'KoPub Batang\', \'KoPubBatang\', serif', this)">KoPub 바탕</button>
                <button class="btn-font f-myeongjo" onclick="setFont('\'Nanum Myeongjo\', serif', this)">나눔명조</button>
                <button class="btn-font f-pretendard" onclick="setFont('\'Pretendard\', sans-serif', this)">Pretendard</button>
                <button class="btn-font f-notosans active" onclick="setFont('\'Noto Sans KR\', sans-serif', this)">Noto Sans</button>
                <button class="btn-font f-gothic" onclick="setFont('\'Nanum Gothic\', sans-serif', this)">나눔고딕</button>
                <button class="btn-font f-orbitron" onclick="setFont('\'Orbitron\', sans-serif', this)">Orbitron (Sci-Fi)</button>
            </div>
        </div>

        <div class="control-card">
            <div class="card-label">배경 테마 (Theme)</div>
            <select id="themeSelect" onchange="updateTheme()">
                <option value="「ARCH」 Quote Neutral A.png" data-color="#1a1a1a" selected>🤍 무속성 (White)</option>
                <option value="「ARCH」 Quote Neutral B.png" data-color="#ffffff">🖤 무속성 (Black)</option>
                <option value="「ARCH」 Quote Pyre.png" data-color="#1a1a1a">🔥 불 (Pyre)</option>
                <option value="「ARCH」 Quote Aqua.png" data-color="#1a1a1a">💧 물 (Aqua)</option>
                <option value="「ARCH」 Quote Verde.png" data-color="#1a1a1a">🌿 풀 (Verde)</option>
                <option value="「ARCH」 Quote Fulmen.png" data-color="#1a1a1a">⚡ 번개 (Fulmen)</option>
                <option value="「ARCH」 Quote Glacies.png" data-color="#1a1a1a">❄️ 얼음 (Glacies)</option>
                <option value="「ARCH」 Quote Aero.png" data-color="#1a1a1a">💨 바람 (Aero)</option>
            </select>
        </div>

        <div class="control-card" style="display:flex; flex-direction: column; gap:15px;">
            <div style="display: flex; gap: 10px;">
                <div style="flex:1;">
                    <div class="card-label" style="margin-bottom:8px;">정렬</div>
                    <div class="toggle-group" id="alignToggleGroup">
                        <button class="btn-toggle active" onclick="setAlign('center', this)">중앙</button>
                        <button class="btn-toggle" onclick="setAlign('left', this)">좌측</button>
                        <button class="btn-toggle" onclick="setAlign('right', this)">우측</button>
                    </div>
                </div>
                <div style="flex:1;">
                    <div class="card-label" style="margin-bottom:8px;">줄바꿈</div>
                    <div class="toggle-group" id="wrapToggleGroup">
                        <button class="btn-toggle active" onclick="setWrap('keep-all', this)">단어</button>
                        <button class="btn-toggle" onclick="setWrap('break-all', this)">글자</button>
                    </div>
                </div>
            </div>

            <div class="adjustment-row">
                <div class="card-label" style="margin:0;">글자 크기</div>
                <div class="adjust-controls">
                    <button class="btn-adjust" onclick="adjust('fontSize', -1)">−</button>
                    <div class="value-display" id="val-fontSize">24<span class="unit">px</span></div>
                    <button class="btn-adjust" onclick="adjust('fontSize', 1)">+</button>
                </div>
            </div>
            <div class="adjustment-row">
                <div class="card-label" style="margin:0;">줄 간격</div>
                <div class="adjust-controls">
                    <button class="btn-adjust" onclick="adjust('lineHeight', -0.1)">−</button>
                    <div class="value-display" id="val-lineHeight">1.5<span class="unit">x</span></div>
                    <button class="btn-adjust" onclick="adjust('lineHeight', 0.1)">+</button>
                </div>
            </div>
            <div class="adjustment-row">
                <div class="card-label" style="margin:0;">자간 (간격)</div>
                <div class="adjust-controls">
                    <button class="btn-adjust" onclick="adjust('letterSpacing', -0.2)">−</button>
                    <div class="value-display" id="val-letterSpacing">0.0<span class="unit">px</span></div>
                    <button class="btn-adjust" onclick="adjust('letterSpacing', 0.2)">+</button>
                </div>
            </div>
        </div>

        <div class="control-card">
            <div class="card-label">
                발췌 내용
                <button class="btn-action-small" onclick="toggleQuotes()">" " ⇄ “ ” 변환</button>
            </div>
            <textarea id="mainInput" oninput="updateText()">“이곳은 초인적인 힘을 가진 소수, ‘센티넬’과 ‘가이드’가 인류를 위협하는 존재들에 맞서 싸우는 최전선입니다.”</textarea>
            <div style="display:flex; gap:10px; margin-top:12px;">
                <input type="text" id="creatorInput" placeholder="제작자명" oninput="updateText()" value="CherryMango" style="flex:1;">
                <input type="text" id="characterInput" placeholder="캐릭터명 (자동 굵게)" oninput="updateText()" value="ARCH" style="flex:1.5;">
            </div>
        </div>

        <div class="action-btn-group">
            <button class="btn-secondary" id="copyBtn" onclick="copyImage()">복사</button>
            <button class="btn-secondary" onclick="toggleCaptureMode()">UI 숨김 (직접캡쳐)</button>
            <button class="btn-primary" id="saveBtn" onclick="saveImage()">파일로 저장</button>
        </div>
    </div>

    <div class="preview-area">
        <div id="capture-area-wrapper">
            <div id="capture-area">
                <div id="text-container">
                    <div class="quote-main" id="display-main">“이곳은 초인적인 힘을 가진 소수, ‘센티넬’과 ‘가이드’가 인류를 위협하는 존재들에 맞서 싸우는 최전선입니다.”</div>
                    <div class="quote-sub" id="display-sub">
                        <span class="creator-name">CherryMango</span> | <span class="character-name">ARCH</span>
                    </div>
                </div>
                <img src="「ARCH」 Symbol Logo Black Ver.png" id="logoDisplay" class="symbol-logo">
            </div>
        </div>
    </div>

    <script>
        let state = {
            fontFamily: "'Noto Sans KR', sans-serif",
            fontSize: 24, lineHeight: 1.5, letterSpacing: 0, 
            textAlign: 'center', wordBreak: 'keep-all', paddingTopBottom: 100, paddingLeftRight: 100
        };

        // 다크모드 토글
        function toggleDarkMode() {
            const body = document.body;
            const icon = document.getElementById('themeIcon');
            const text = document.getElementById('themeText');
            
            body.classList.toggle('dark-mode');
            
            if(body.classList.contains('dark-mode')) {
                icon.textContent = "☀️";
                text.textContent = "LIGHT MODE";
            } else {
                icon.textContent = "🌙";
                text.textContent = "DARK MODE";
            }
        }

        // 직접 캡쳐 모드 (UI 숨기기)
        function toggleCaptureMode() {
            document.body.classList.toggle('capture-mode');
            
            setTimeout(resizeCanvas, 50); 
        }

        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.body.classList.contains('capture-mode')) {
                toggleCaptureMode();
            }
        });

        function resizeCanvas() {
            const wrapper = document.getElementById('capture-area-wrapper');
            const area = document.getElementById('capture-area');
            if(wrapper && area) {
                const scale = wrapper.clientWidth / 700;
                area.style.transform = `scale(${scale})`;
            }
        }
        window.addEventListener('resize', resizeCanvas);
        setTimeout(resizeCanvas, 100);

        function setFont(fontValue, btn) {
            state.fontFamily = fontValue;
            const group = document.getElementById('fontToggleGroup');
            group.querySelectorAll('.btn-font').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateStyle();
        }

        function adjust(key, val) {
            state[key] = parseFloat((state[key] + val).toFixed(1));
            if(key !== 'letterSpacing' && state[key] < 0) state[key] = 0; 
            const displayEl = document.getElementById(`val-${key}`);
            if(displayEl){
                let unit = key === 'lineHeight' ? 'x' : 'px';
                displayEl.innerHTML = state[key] + `<span class="unit">${unit}</span>`;
            }
            updateStyle();
        }

        function toggleQuotes() {
            const textarea = document.getElementById('mainInput');
            let text = textarea.value;
            const hasStraight = /['"]/.test(text);
            const hasCurved = /[“”‘’]/.test(text);

            if (hasStraight && !hasCurved) {
                text = text.replace(/'([\s\S]*?)'/g, "‘$1’").replace(/"([\s\S]*?)"/g, "“$1”");
            } else if (hasCurved) {
                text = text.replace(/‘([\s\S]*?)’/g, "'$1'").replace(/“([\s\S]*?)”/g, '"$1"');
            } else {
                if(text.trim() !== "") text = `“${text.trim()}”`;
            }
            textarea.value = text;
            updateText();
        }

        function setAlign(value, btn) {
            state.textAlign = value;
            const group = document.getElementById('alignToggleGroup');
            group.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateStyle();
        }

        function setWrap(value, btn) {
            state.wordBreak = value;
            const group = document.getElementById('wrapToggleGroup');
            group.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateStyle();
        }

        function updateStyle() {
            const main = document.getElementById('display-main');
            const sub = document.getElementById('display-sub');
            const area = document.getElementById('capture-area');
            const textContainer = document.getElementById('text-container');
            
            main.style.fontFamily = state.fontFamily;
            sub.style.fontFamily = state.fontFamily;
            
            main.style.fontSize = state.fontSize + 'px';
            main.style.lineHeight = state.lineHeight;
            main.style.letterSpacing = state.letterSpacing + 'px';
            main.style.textAlign = state.textAlign;
            main.style.wordBreak = state.wordBreak;

            sub.style.textAlign = state.textAlign;
            sub.style.letterSpacing = state.letterSpacing + 'px';
            
            area.style.padding = `${state.paddingTopBottom}px ${state.paddingLeftRight}px`;
            
            if(state.textAlign === 'left') textContainer.style.alignItems = 'flex-start';
            else if(state.textAlign === 'right') textContainer.style.alignItems = 'flex-end';
            else textContainer.style.alignItems = 'center';
        }

        function updateText() {
            document.getElementById('display-main').textContent = document.getElementById('mainInput').value;
            const creator = document.getElementById('creatorInput').value;
            const character = document.getElementById('characterInput').value;
            document.getElementById('display-sub').innerHTML = `<span class="creator-name">${creator}</span> | <span class="character-name">${character}</span>`;
        }

        function updateTheme() {
            const select = document.getElementById('themeSelect');
            const bg = select.value;
            const color = select.options[select.selectedIndex].dataset.color;
            const logo = document.getElementById('logoDisplay');
            
            document.getElementById('capture-area').style.backgroundImage = `url('${bg}')`;
            document.getElementById('display-main').style.color = color;
            document.getElementById('display-sub').style.color = color;

            if(bg === '「ARCH」 Quote Neutral B.png') logo.src = '「ARCH」 Symbol Logo White Ver.png';
            else logo.src = '「ARCH」 Symbol Logo Black Ver.png';
        }

        // 이미지 파일 다운로드
        function saveImage() {
            const btn = document.getElementById('saveBtn');
            const originalText = btn.textContent;
            btn.textContent = "생성 중..."; btn.disabled = true;

            const area = document.getElementById('capture-area');
            const originalTransform = area.style.transform;
            area.style.transform = 'scale(1)';
            
            setTimeout(() => {
                html2canvas(area, { scale: 2, useCORS: true, backgroundColor: null }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `ARCH_LOG_${Date.now()}.png`;
                    link.href = canvas.toDataURL();
                    link.click();
                    area.style.transform = originalTransform;
                    btn.textContent = originalText; btn.disabled = false;
                });
            }, 100);
        }

        // 이미지 클립보드 복사
        function copyImage() {
            const btn = document.getElementById('copyBtn');
            const originalText = btn.textContent;
            btn.textContent = "복사 중..."; btn.disabled = true;

            const area = document.getElementById('capture-area');
            const originalTransform = area.style.transform;
            area.style.transform = 'scale(1)';
            
            setTimeout(() => {
                html2canvas(area, { scale: 2, useCORS: true, backgroundColor: null }).then(canvas => {
                    canvas.toBlob(blob => {
                        try {
                            const item = new ClipboardItem({ 'image/png': blob });
                            navigator.clipboard.write([item]).then(() => {
                                btn.textContent = "복사 완료!";
                                setTimeout(() => { btn.textContent = originalText; btn.disabled = false; }, 2000);
                            }).catch(err => {
                                alert("이 브라우저/환경에서는 클립보드 이미지 복사를 지원하지 않습니다. (https 환경 필요)");
                                btn.textContent = originalText; btn.disabled = false;
                            });
                        } catch(e) {
                            alert("클립보드 API를 지원하지 않는 브라우저입니다.");
                            btn.textContent = originalText; btn.disabled = false;
                        }
                        area.style.transform = originalTransform;
                    }, 'image/png');
                });
            }, 100);
        }

        updateStyle(); updateTheme(); updateText();
    </script>
</body>
</html>
